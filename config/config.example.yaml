# CAN Parser Tools 配置文件示例
# 复制此文件为 config.yaml 并根据需要修改

# 项目信息
project:
  name: "CAN Parser Tools"
  version: "1.3.0"

# 路径配置
paths:
  # DBC文件目录
  dbc_dir: "data/dbc"
  
  # 输入文件目录
  input_dir: "data/input"
  
  # 输出文件目录
  output_dir: "data/output"
  
  # 协议文档目录
  docs_dir: "docs/protocols"
  
  # 日志目录
  log_dir: "logs"

# 解析器配置
parser:
  # 批处理大小
  batch_size: 1000
  
  # 启用缓存
  enable_cache: true
  
  # 缓存大小
  max_cache_size: 256
  
  # 支持的编码列表（按优先级）
  encodings:
    - utf-8
    - gbk
    - gb2312
    - latin-1

# 日志配置
logging:
  # 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"
  
  # 日志格式
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # 日志文件
  file: "logs/parser.log"
  
  # 日志文件最大大小（MB）
  max_size: 10
  
  # 保留的日志文件数量
  backup_count: 5

# 输出配置
output:
  # 默认输出格式: csv, json
  default_format: "csv"
  
  # CSV配置
  csv:
    # 分隔符
    delimiter: ","
    
    # 编码
    encoding: "utf-8"
    
    # 包含标题行
    include_header: true
  
  # 浮点数格式化
  float_format:
    # 是否遵循DBC定义的精度
    follow_dbc_precision: true
    
    # 默认小数位数（当无DBC定义时）
    default_decimals: 6

# 验证配置
validation:
  # 允许的误差范围
  tolerance: 0.0001
  
  # 验证项目
  checks:
    - signal_count
    - signal_names
    - data_format
    - data_content

# Excel转DBC配置
excel_converter:
  # 协议工作表关键词
  sheet_keywords:
    - "CAN"
    - "协议"
    - "Protocol"
  
  # 跳过的工作表
  skip_sheets:
    - "说明"
    - "README"
    - "目录"
